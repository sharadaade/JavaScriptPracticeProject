<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>Object</title>
    <link rel="stylesheet" href="../../Content/bootstrap.css"/>
</head>
<body>
    <script>
        var product = {
            Name: "TV",
            Price: 45000.44
        }
        product.Name = "Samsung TV";
        product.Price = 50000.00;

        document.write(`Product = ${product.Name} <br>`);
        document.write(`Price = ${product.Price}`);
    </script>
</body>
</html>
