<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title></title>
    <script>
        function checkValidation() {
            let txtName = document.getElementById('txtName').value;
            let txtError = document.getElementById('txtError');
            if (txtName == 0) {
                txtError.innerHTML = `Username required`.fontcolor('red');
            } else {
                if (txtName.length < 4) {
                    txtError.innerHTML = `Name is to short`.fontcolor('red');
                } else {
                    txtError.innerHTML = ``;
                }
            }
        }
    </script>
</head>
<body>

    Username : <input type="text"  id="txtName" onblur="checkValidation()"/>
    <p id="txtError"></p>
</body>
</html>
